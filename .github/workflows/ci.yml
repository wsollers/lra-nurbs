# =============================================================
# ci.yml — lra-nurbs
# Builds on Windows (MSVC x64) and Linux (Clang x64).
# Runs CodeQL C++ analysis on the Linux build.
#
# Triggers:
#   push / PR to main or develop on relevant paths.
#   Weekly scheduled CodeQL scan (Sunday 02:00 UTC).
# =============================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'shaders/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'shaders/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
  schedule:
    - cron: '0 2 * * 0'   # weekly CodeQL scan, Sunday 02:00 UTC
  workflow_dispatch:

jobs:

  # ===========================================================
  # Job 1: Windows x64 — MSVC
  # ===========================================================
  build-windows:
    name: Windows x64 · MSVC
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: '1.3.296.0'
          install_runtime: true
          cache: true

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure (MSVC Release)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_SANITIZERS=OFF ^
            -DNDDE_ENABLE_CLANG_TIDY=OFF

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --config Release --parallel

      - name: Test
        shell: cmd
        working-directory: build
        run: ctest -C Release --output-on-failure --parallel 4

  # ===========================================================
  # Job 2: Linux x64 — Clang
  # ===========================================================
  build-linux:
    name: Linux x64 · Clang
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 lld-18 \
            libvulkan-dev vulkan-validationlayers-dev glslang-tools \
            libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            cmake ninja-build python3

      - name: Set Clang as default compiler
        run: |
          sudo update-alternatives --install /usr/bin/cc  cc  /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-18 100

      - name: Configure (Clang Release)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DENABLE_SANITIZERS=OFF \
            -DNDDE_ENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel 4

  # ===========================================================
  # Job 3: CodeQL — C++ analysis (Linux Clang build)
  # ===========================================================
  codeql:
    name: CodeQL · C++
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 lld-18 \
            libvulkan-dev vulkan-validationlayers-dev glslang-tools \
            libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            cmake ninja-build python3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          config: |
            paths:
              - src
              - tests
            paths-ignore:
              - build

      - name: Configure (for CodeQL)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DENABLE_SANITIZERS=OFF \
            -DNDDE_ENABLE_CLANG_TIDY=OFF

      - name: Build (traced by CodeQL)
        run: cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:c-cpp'
