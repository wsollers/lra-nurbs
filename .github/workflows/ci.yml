name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'assets/**'
      - 'cmake/**'
      - 'docker/**'
      - 'shaders/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'CMakeLists.txt'
      - 'engine_config.json'
  pull_request:
    branches: [main]
    paths:
      - 'assets/**'
      - 'cmake/**'
      - 'docker/**'
      - 'shaders/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - 'CMakeLists.txt'
      - 'engine_config.json'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 · MSVC
            os: windows-latest
            mode: windows-msvc
            build-type: Release
          - name: Linux x64 · Clang container
            os: ubuntu-24.04
            mode: linux-clang-container
            build-type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        if: matrix.mode == 'windows-msvc'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: '1.3.296.0'
          install_runtime: true
          cache: true

      - name: Install Python 3
        if: matrix.mode == 'windows-msvc'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Windows MSVC
        if: matrix.mode == 'windows-msvc'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} ^
            -DENABLE_SANITIZERS=OFF ^
            -DNDDE_ENABLE_CLANG_TIDY=OFF

      - name: Build Windows MSVC
        if: matrix.mode == 'windows-msvc'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --config ${{ matrix.build-type }} --parallel

      - name: Test Windows MSVC
        if: matrix.mode == 'windows-msvc'
        shell: cmd
        working-directory: build
        run: ctest -C ${{ matrix.build-type }} --output-on-failure --parallel 4

      - name: Build Linux Clang container image
        if: matrix.mode == 'linux-clang-container'
        run: docker build -t lra-nurbs-linux -f docker/linux-clang.Dockerfile .

      - name: Configure, build, and test in Linux container
        if: matrix.mode == 'linux-clang-container'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-nurbs-linux \
            bash -lc 'cmake -S . -B build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
              -DCMAKE_C_COMPILER=clang-18 \
              -DCMAKE_CXX_COMPILER=clang++-18 \
              -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
              -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -fexperimental-library" \
              -DENABLE_SANITIZERS=OFF \
              -DNDDE_ENABLE_CLANG_TIDY=OFF &&
            cmake --build build --parallel &&
            ctest --test-dir build --output-on-failure --parallel 4'

  codeql:
    name: CodeQL · C++
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 lld-18 \
            libc++-18-dev libc++abi-18-dev libunwind-18-dev \
            libgl1-mesa-dev libvulkan-dev \
            vulkan-utility-libraries-dev vulkan-validationlayers glslang-tools \
            libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            cmake ninja-build python3 pkg-config

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          config: |
            paths:
              - src
              - tests
            paths-ignore:
              - build

      - name: Configure for CodeQL
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -fexperimental-library" \
            -DENABLE_SANITIZERS=OFF \
            -DNDDE_ENABLE_CLANG_TIDY=OFF

      - name: Build traced by CodeQL
        run: cmake --build build --parallel

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:c-cpp'
